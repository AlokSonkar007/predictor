<html>
    <body>
        <div class="login">
            <h1>Student Exam Performance Indicator</h1>
        </div>

        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <h1>
                <legend>
                    Student Exam Performance Indicator
                </legend>
            </h1>
            <div class="mb-3">
                <label class="form-label">
                    Gender
                </label>
                <select name="gender" placeholder="Enter your gender" class="form-control" required>
                    <option selected disabled value="" class="placeholder">
                        Select your Gender
                    </option>
                    <option value="male">
                        Male
                    </option>
                    <option value="female">
                        Female
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Race or Ethnicity
                </label>
                <select name="race_ethnicity" placeholder="Enter your Ethnicity" class="form-control">
                    <option class="placeholder" selected disabled value="">
                        Select Ethnicity
                    </option>
                    <option value="group A">
                        Group A
                    </option>
                    <option value="group B">
                        Group B
                    </option>
                    <option value="group C">
                        Group C
                    </option>
                    <option value="group D">
                        Group D
                    </option>
                    <option value="group E">
                        Group E
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Parental level of Education
                </label>
                <select name="parental_level_of_education" class="form-control" placeholder="Enter your parents's Education" required>
                    <option selected disabled value="" class="placeholder">
                        Select parent education
                    </option>
                    <option value="associate's degree">
                        associate's degree
                    </option>
                    <option value="bachelor's degree">
                        bachelor's degree
                    </option>
                    <option value="high school">
                        high school
                    </option>
                    <option value="master's degree">
                        master's degree
                    </option>
                    <option value="some college">
                        some college
                    </option>
                    <option value="some high school">
                        some high school
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Lunch type
                </label>
                <select name="lunch" placeholder="Enter your lunch" class="form-control" required>
                    <option selected disabled value="" class="placeholder">
                        Select your Lunch type
                    </option>
                    <option value="free/reduced">
                        free/reduced
                    </option>
                    <option value="standard">
                        standard
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Test preparation course
                </label>
                <select name="test_preparation_course" placeholder="Whether your course is completed or not" class="form-control" required>
                    <option selected disabled value="" class="placeholder">
                        Select your test preparation course
                    </option>
                    <option value="none">
                        none
                    </option>
                    <option value="completed">
                        completed
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Reading score out of 100
                </label>
                <input name="reading_score" type="number" class="form-control" 
                placeholder="Enter your reading score" min="0" max="100" required>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Writing score out of 100
                </label>
                <input name="writing_score" type="number" class="form-control" 
                placeholder="Enter your writing score" min="0" max="100" required>
            </div>
            <div class="mb-3">
                <button type="submit" value="Predict your maths score" class="btn btn-primary" required>
                    Predict your maths score
                </button>
            </div>
        </form>
        <h2>
            The prediction is {{results}}
        </h2>
    </body>
</html>
