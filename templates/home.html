<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Score</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="card">
        <h2>Predict Math Score</h2>
        
        <form action="/predictdata" method="POST">
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="" disabled selected>Select your gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race or Ethnicity</label>
                <select name="race_ethnicity" required>
                    <option value="" disabled selected>Select ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select name="parental_level_of_education" required>
                    <option value="" disabled selected>Select parent education</option>
                    <option value="associate's degree">associate's degree</option>
                    <option value="bachelor's degree">bachelor's degree</option>
                    <option value="high school">high school</option>
                    <option value="master's degree">master's degree</option>
                    <option value="some college">some college</option>
                    <option value="some high school">some high school</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lunch Type</label>
                <select name="lunch" required>
                    <option value="" disabled selected>Select lunch type</option>
                    <option value="free/reduced">free/reduced</option>
                    <option value="standard">standard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation Course</label>
                <select name="test_preparation_course" required>
                    <option value="" disabled selected>Select course status</option>
                    <option value="none">none</option>
                    <option value="completed">completed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Reading Score (out of 100)</label>
                <input type="number" name="reading_score" min="0" max="100" placeholder="e.g. 85" required>
            </div>

            <div class="form-group">
                <label>Writing Score (out of 100)</label>
                <input type="number" name="writing_score" min="0" max="100" placeholder="e.g. 80" required>
            </div>

            <button type="submit" class="btn">Predict Score</button>
        </form>

        {% if results %}
        <div class="result-box">
            Predicted Math Score: <strong>{{ results }}</strong>
        </div>
        {% endif %}
    </div>
</body>
</html>
